name: Known Issue
description: Track a KI for repayment.
title: "KI: "
labels:
  - fdp:triage-needed
  - fdp:ki
body:
  - type: markdown
    attributes:
      value: |
        Known Issues are repayment records. Submitting this form does not authorize Codex or maintainers to start work until triage accepts the issue or links it to an approved WI.
  - type: input
    id: ki_id
    attributes:
      label: KI id
      description: Existing KI id or "provisional" if not assigned yet.
    validations:
      required: true
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - critical
        - high
        - medium
        - low
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Surface
      options:
        - policy
        - specification
        - automation
        - validation
        - documentation
        - security
        - release-boundary
        - unknown
    validations:
      required: true
  - type: input
    id: related_wi
    attributes:
      label: Related WI
      placeholder: WI-CX0000-category
    validations:
      required: false
  - type: input
    id: owner
    attributes:
      label: Owner or ownership status
      placeholder: maintainer, contributor, unassigned, or unknown
    validations:
      required: true
  - type: textarea
    id: trigger
    attributes:
      label: Trigger
      description: What exposed this issue?
    validations:
      required: true
  - type: textarea
    id: defer_reason
    attributes:
      label: Defer reason
      description: If this is not fixed immediately, why is deferral acceptable?
    validations:
      required: false
  - type: textarea
    id: repayment
    attributes:
      label: Repayment condition and hard stop
      description: What must be true before this KI can close, and what boundary cannot be crossed first?
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Link records, PRs, commands, files, or failing checks.
    validations:
      required: false