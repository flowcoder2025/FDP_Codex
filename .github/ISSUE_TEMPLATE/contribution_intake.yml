name: Contribution Intake
description: Propose a change without authorizing automatic work.
title: "Proposal: "
labels:
  - fdp:triage-needed
body:
  - type: markdown
    attributes:
      value: |
        Public submissions are intake. They do not authorize Codex or maintainers to start implementation until triage accepts the item or links it to an approved WI.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposed_change
    attributes:
      label: Proposed change
      description: Describe the smallest useful change.
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Surface
      options:
        - policy
        - specification
        - automation
        - validation
        - documentation
        - security
        - release-boundary
        - unknown
    validations:
      required: true
  - type: dropdown
    id: risk_guess
    attributes:
      label: Risk guess
      description: Maintainers may change this during triage.
      options:
        - R0 documentation or formatting only
        - R1 low-risk local change
        - R2 policy, manifest, workflow, or cross-document consistency
        - R3 security, release, publication, dependency, external contract, or destructive behavior
        - unknown
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Suggested validation
      description: How should maintainers verify this?
    validations:
      required: false
  - type: textarea
    id: boundaries
    attributes:
      label: Boundaries or hard stops
      description: Mention anything that must not change as part of this proposal.
    validations:
      required: false