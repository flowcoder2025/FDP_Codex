name: independent-review

on:
  pull_request:
    types:
      - synchronize
      - labeled
      - unlabeled
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - labeled
      - unlabeled
  pull_request_review:
    types:
      - submitted
      - edited
      - dismissed
  workflow_dispatch:
    inputs:
      pr:
        description: Pull request number
        required: true
        type: number

permissions:
  contents: read
  pull-requests: read
  statuses: write

concurrency:
  group: independent-review-${{ github.repository }}-${{ github.event.pull_request.number || inputs.pr }}
  cancel-in-progress: true

jobs:
  status-publisher:
    if: github.event_name != 'pull_request' || github.event.pull_request.number == 58
    name: trusted-independent-review-status-publisher
    runs-on: ubuntu-latest
    steps:
      - name: Checkout trusted default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.event.repository.default_branch }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"

      - name: Resolve PR number
        id: pr
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "number=${{ inputs.pr }}" >> "$GITHUB_OUTPUT"
            echo "head=$(gh pr view '${{ inputs.pr }}' --json headRefOid --jq .headRefOid)" >> "$GITHUB_OUTPUT"
          else
            echo "number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
            echo "head=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish current-head independent review status
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          node scripts/publish-independent-review-status.mjs
          --pr "${{ steps.pr.outputs.number }}"
          --target-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
