name: independent-review

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - labeled
      - unlabeled
  pull_request_review:
    types:
      - submitted
      - edited
      - dismissed
  workflow_dispatch:
    inputs:
      pr:
        description: Pull request number
        required: true
        type: number

permissions:
  contents: read
  pull-requests: read
  statuses: write

jobs:
  independent-review:
    name: independent-review
    runs-on: ubuntu-latest
    steps:
      - name: Checkout trusted default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"

      - name: Resolve PR number
        id: pr
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "number=${{ inputs.pr }}" >> "$GITHUB_OUTPUT"
            echo "head=$(gh pr view '${{ inputs.pr }}' --json headRefOid --jq .headRefOid)" >> "$GITHUB_OUTPUT"
          else
            echo "number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
            echo "head=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Audit current-head independent review
        id: audit
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: node scripts/audit-independent-review.mjs --pr "${{ steps.pr.outputs.number }}" --allow-merge-approved

      - name: Publish required status
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ steps.pr.outputs.head }}
          AUDIT_OUTCOME: ${{ steps.audit.outcome }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          state=failure
          description="Independent review missing, stale, or blocking"
          if [[ "$AUDIT_OUTCOME" == "success" ]]; then
            state=success
            description="Independent current-head review passed"
          fi
          gh api --method POST "repos/${GITHUB_REPOSITORY}/statuses/${HEAD_SHA}" \
            -f state="$state" \
            -f context="independent-review" \
            -f description="$description" \
            -f target_url="$RUN_URL"

      - name: Enforce audit result
        if: steps.audit.outcome != 'success'
        run: exit 1
