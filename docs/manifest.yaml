schema_version: 0
project:
  id: fdp-codex
  name: FDP_Codex
  status: public-readiness-baseline
  purpose: Codex-native open FDP workflow kit
  repository: https://github.com/flowcoder2025/FDP_Codex.git
  visibility: public
  license: Apache-2.0

authority_order:
  - AGENTS.md
  - docs/manifest.yaml
  - docs/policies
  - docs/specifications
  - docs/decisions
  - docs/runbooks
  - .flowset/current-wi.md
  - .flowset/fix_plan.md
  - .flowset/handoff.md
  - docs/records
  - LICENSE

always_on:
  - id: root.agents
    source: AGENTS.md
    reason: repository-level agent rules
  - id: registry.manifest
    source: docs/manifest.yaml
    reason: machine-readable SSOT and chunk registry

context_policy:
  active_context_scope: current_wi_and_session_only
  carry_context_pack_bodies_across_wi: false
  carry_context_pack_bodies_across_session: false
  ledger_body_storage: forbidden
  rebuild_context_from_manifest_per_wi: true
  default_hash: sha256-file

repository:
  remote: https://github.com/flowcoder2025/FDP_Codex.git
  visibility: public
  default_branch_seen: main
  public_visibility_authorized: true
  release_publication_authorized: false
  oss_submission_authorized: false

license:
  spdx: Apache-2.0
  source: LICENSE
  decision_ref: decision.repository-license

ledger:
  path: .flowset/context-ledger.jsonl
  body_storage: forbidden
  allowed_fields:
    - timestamp
    - wi_id
    - chunk_id
    - source
    - hash
    - load_reason
    - decision_ref
    - actor

